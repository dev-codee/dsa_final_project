<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DB Rides — Select Role</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(88, 28, 135, 0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(15, 118, 110, 0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 50% 80%, rgba(30, 64, 175, 0.1) 0%, transparent 60%);
            animation: pulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 48px 40px;
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 25px 50px -12px rgba(0, 0, 0, 0.6);
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 3px solid rgba(99, 102, 241, 0.5);
            object-fit: cover;
        }

        .avatar-placeholder {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #6366f1, #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #fafafa;
        }

        .email {
            font-size: 0.85rem;
            color: #71717a;
            margin-bottom: 32px;
        }

        .subtitle {
            font-size: 1rem;
            color: #a1a1aa;
            margin-bottom: 28px;
        }

        .roles {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }

        .role-card {
            flex: 1;
            padding: 28px 20px;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.25s ease;
            text-decoration: none;
            color: inherit;
        }

        .role-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.3);
        }

        .role-card.user:hover {
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 12px 32px rgba(99, 102, 241, 0.15);
        }

        .role-card.driver:hover {
            border-color: rgba(6, 182, 212, 0.5);
            box-shadow: 0 12px 32px rgba(6, 182, 212, 0.15);
        }

        .role-icon {
            font-size: 40px;
            margin-bottom: 14px;
        }

        .role-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #fafafa;
        }

        .role-desc {
            font-size: 0.8rem;
            color: #71717a;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="card">
        {% if picture %}
        <img src="{{ picture }}" alt="avatar" class="avatar" referrerpolicy="no-referrer" />
        {% else %}
        <div class="avatar-placeholder">{{ name[0] | upper }}</div>
        {% endif %}

        <h1>Welcome, {{ name }}!</h1>
        <p class="email">{{ email }}</p>
        <p class="subtitle">How would you like to use DB Rides?</p>

        <div class="roles">
            <a href="{{ url_for('auth.set_role', role='user') }}" class="role-card user">
                <div class="role-icon">🧑‍💼</div>
                <div class="role-title">User</div>
                <div class="role-desc">Book rides and get where you need to go</div>
            </a>
            <a href="{{ url_for('auth.set_role', role='driver') }}" class="role-card driver">
                <div class="role-icon">🚗</div>
                <div class="role-title">Driver</div>
                <div class="role-desc">Accept ride requests and earn money</div>
            </a>
        </div>
    </div>
</body>

</html>
